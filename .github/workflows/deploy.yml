name: Deploy
on: [push]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:

      - name: Login to Docker Hub
        run: docker login -u ${{ secrets.DOCKER_USERNAME }} -p ${{ secrets.DOCKER_PASSWORD }}
      - name: Go to project root
      run: |
        echo "Before: $(pwd)"
        cd ${{ github.workspace }}
        echo "After: $(pwd)"
        ls -la Dockerfile

      - name: Build and push
        run: |
          docker build -t georhugaev/task-tracker-backend:latest .
          docker push georhugaev/task-tracker-backend:latest
      - name: Deploy
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          script: |
            cd /home/appuser/task-tracker
            docker-compose pull app
            docker-compose up -d app
